# GitHub Action to greet people
# More info at https://github.com/portfolio-2026br/security

---
name: Greetings

"on":
  pull_request:
    types: [opened]
  issues:
    types: [opened]

permissions:
  contents: read

jobs:
  greeting:
    runs-on: ubuntu-latest
    name: greetings

    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443

      - uses: actions/first-interaction@753c925c8d1ac6fede23781875376600628d9b5d # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Welcome and thank you for helping us improve our software.

            We hope to see you soon!
          pr-message: |
            Wow, your first PR. Thank you.

            We hope to see you soon!
